services:

  postgres:
    image: postgres:15
    container_name: ads_postgres
    environment:
      POSTGRES_DB: ads
      POSTGRES_USER: ads_user
      POSTGRES_PASSWORD: ads_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: ads_backend
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ads
      SPRING_DATASOURCE_USERNAME: ads_user
      SPRING_DATASOURCE_PASSWORD: ads_password
    ports:
      - "8080:8080"

volumes:
  postgres_data: