spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/ads}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ads_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ads_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

server.port=${SERVER_PORT:8080}

app.images.dir=${APP_IMAGES_DIR:images}